<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Paper Trader{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        nav {
            padding: 0.5rem 1rem;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--pico-card-background-color);
            border: 1px solid var(--pico-muted-border-color);
            border-radius: var(--pico-border-radius);
            padding: 1rem;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--pico-muted-color);
        }
        .positive { color: #22c55e; }
        .negative { color: #ef4444; }
        .warning { color: #f59e0b; }
        .badge {
            display: inline-block;
            padding: 0.2em 0.6em;
            font-size: 0.75rem;
            border-radius: 1rem;
            font-weight: 600;
        }
        .badge-buy { background: #dcfce7; color: #166534; }
        .badge-sell { background: #fee2e2; color: #991b1b; }
        .badge-hold { background: #f3f4f6; color: #374151; }
        .alert {
            padding: 1rem;
            border-radius: var(--pico-border-radius);
            margin-bottom: 1rem;
        }
        .alert-warning { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; }
        .alert-danger { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; }
        .alert-info { background: #dbeafe; border: 1px solid #3b82f6; color: #1e40af; }
        #equity-chart {
            max-height: 300px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><strong>Paper Trader</strong></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/decisions">Decisions</a></li>
            <li><a href="/journal">Journal</a></li>
            <li><a href="/api-usage">API Usage</a></li>
            <li><a href="/dry-run">Dry Run</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Paper Trader v0.1.0 — Educational use only</small>
    </footer>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
